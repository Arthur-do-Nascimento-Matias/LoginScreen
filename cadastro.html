<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video src="104116-665395729.mp4" autoplay loop muted></video>
    <div class="login-container">
        <form action="/cadastro" method="get" id="cadastroForm">
            <h1>Cadastro</h1>
            <div class="input-group">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome" required>
            </div>
            <div class="input-group">
                <label for="user">Usuário</label>
                <input type="text" name="user" id="user" placeholder="Digite seu usuário" required>
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="text" name="password" id="password" placeholder="Crie uma senha" required>
            </div>
            <button type="submit">Cadastrar</button>
        </form>
        <p class="linkcadastro">
            Já tem conta? <a href="index.html">Faça login</a>
        </p>
    </div>
    <script src="scriptCadastro.js"></script>
</body>
</html>
